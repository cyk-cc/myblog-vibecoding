{% extends "base.html" %}

{% block title %}首页 - 我的博客{% endblock %}

{% block content %}
<div class="post-list">
    {% for post in posts %}
    <article class="post-item">
        <h2 class="post-title">
            <a href="{{ url_for('blog.post', slug=post.slug) }}">{{ post.title }}</a>
        </h2>
        <div class="post-meta">
            <time datetime="{{ post.date }}">{{ post.date | format_date }}</time>
            <span class="views-count">👁 {{ post.views }} 阅读</span>
        </div>
        <p class="post-summary">{{ post.summary }}</p>
        <a href="{{ url_for('blog.post', slug=post.slug) }}" class="read-more">阅读更多 →</a>
    </article>
    {% else %}
    <div class="empty-state">
        <p>还没有文章，快来写一篇吧！</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
